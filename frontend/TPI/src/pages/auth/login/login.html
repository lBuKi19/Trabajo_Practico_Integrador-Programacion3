<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="/src/style.css">
    <title>Food Store - Login</title>
</head>

<body>
    <main class="container">
        <form id="form_login">
            <h1> FOOD STORE</h1>
            <h2>Login</h2>

            <div>
                <label class="label_form" for="email">Email</label>
                <input type="email" id="email" class="input_form" name="email" autocomplete="off" placeholder="example@example.com" required>
            </div>
            <div>
                <label class="label_form" for="password">Contraseña</label>
                <input type="password" id="password" class="input_form" name="password" autocomplete="off" placeholder="********" required>
            </div>

            <button type="submit" class="btn_form">Ingresar</button>
            <p class="link_loggeo">¿No tenés cuenta? <a href="/src/pages/auth/registro/registro.html" class="link"> Registrate aquí</a></p>
        </form>
    </main>
    <script type="module" src="./login.ts"></script>
</body>

</html>
