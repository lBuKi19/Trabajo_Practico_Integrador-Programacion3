<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Vista Carrito</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <header class="header">
            <h1>!Fs</h1>
            <nav class="navegacion">
                <ul>
                    <li><a href="/src/pages/store/home/home.html" rel="noopener noreferrer">Inicio</a></li>
                    <li><a href="/src/pages/client/orders/pedidos.html">Mis Pedidos</a></li>
                    <li><a href="#">Carrito<span id="cart-badge">0</span></a></li>
                    <li><a href="#">Panel Admin</a></li>
                    <li><button id="logoutButton">Cerrar sesión</button></li>
                </ul>
            </nav>      
    </header>

    <h2 class="titulo-carrito">Mi Carrito</h2>
    <main class="contenedor-carrito">
        <div class="carrito" id="carrito">
            <div class="producto-carrito">
                <p id="carrito-vacio" style="display: none;">
                    Tu carrito está vacío
                </p>

            </div>
        </div>
        <div class="resumen-carrito">
            <div class="resumen-pedido">
                <h2 class="resumen-titulo">Resumen del Pedido</h2>
                <div class="subtotal-envio">
                    <p class="subtotal">Subtotal</p>
                    <p id="subtotal"></p>
                </div>
                <div class="subtotal-envio">
                    <p class="envio">Envío</p>
                    <p id="envio"></p>
                </div>
                <h2 id="total-carrito"></h2>
                <button id="checkout" type="button">Proceder al Pago</button>
                <button id="vaciar-carrito" type="button">Vaciar Carrito</button>

            </div>
            
        </div>

    </main>
        <div id="checkout-modal" class="checkout-modal" style="display: none;">
        <div class="checkout-modal-content">
        <div class="checkout-modal-header">
        <h2>Completar Pedido</h2>
        <button id="close-checkout-modal" type="button">×</button>
        </div>

        <form id="checkout-form">
        <div class="form-group">
            <label for="checkout-phone">Teléfono</label>
            <input
            type="text"
            id="checkout-phone"
            placeholder="Ej: +54 9 261 123-4567"
            required
            />
        </div>

        <div class="form-group">
            <label for="checkout-address">Dirección de Entrega</label>
            <textarea
            id="checkout-address"
            placeholder="Calle, número, piso, depto"
            required
            ></textarea>
        </div>

        <div class="form-group">
            <label for="checkout-payment">Método de Pago</label>
            <select id="checkout-payment" required>
            <option value="">Seleccione un método</option>
            <option value="EFECTIVO">Efectivo</option>
            <option value="TARJETA">Tarjeta</option>
            <option value="TRANSFERENCIA">Transferencia</option>
            </select>
        </div>

        <div class="form-group">
            <label for="checkout-notes">Notas adicionales</label>
            <textarea
            id="checkout-notes"
            placeholder="Instrucciones especiales, timbre, etc."
            ></textarea>
        </div>

        <div class="checkout-total-row">
            <strong>Total a pagar:</strong>
            <span id="checkout-total">$0</span>
        </div>

        <button type="submit" id="confirm-checkout">
            Confirmar Pedido
        </button>
        </form>
    </div>
    </div>
    
    <footer>
        <p class="p_footer">Food Store. Todos los derechos reservados</p>
        <p class="p_footer">Información de contacto: <a href="#" rel="noopener noreferrer">info@foodstore.com</a></p>

    </footer>   
    <script type="module" src="cart.ts"></script>

</body>
</html>
